<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PDF 图片排布工具</title>
<link rel="stylesheet" href="style.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<div class="container">
  <h1>PDF 图片排布工具</h1>
  <p class="sub">上传 PDF → 按页拆分 → 选择排布样式 → 为每个槽位分配图片 → 导出超高清图</p>

  <!-- 1. 上传 -->
  <div class="panel">
    <h2>1. 上传 PDF</h2>
    <div class="row">
      <label class="file-label" for="pdf-input">选择 PDF 文件</label>
      <input type="file" id="pdf-input" accept="application/pdf" />
      <button id="clean-watermark-btn">去水印上传 PDF</button>
      <button id="download-all-btn" disabled>下载所有图片 (ZIP)</button>
      <span class="status" id="upload-status">尚未上传</span>
    </div>
    <p style="color:#888;font-size:12px;margin-top:8px;line-height:1.6;">
      <b style="color:#f5f1e8;">去水印流程：</b>点击「去水印上传 PDF」→ 在新打开的 SlideDeckCleaner 页面上传 PDF → 下载清洗后的版本 → 回到这里点「选择 PDF 文件」上传清洗版。
    </p>
    <div class="pages-grid" id="pages-grid"></div>
  </div>

  <!-- 2. 画布与背景 -->
  <div class="panel">
    <h2>2. 画布与背景</h2>
    <div class="row">
      <label class="field">画布比例
        <select id="ratio">
          <option value="3:4" selected>3:4（默认）</option>
          <option value="1:1">1:1 正方形</option>
          <option value="9:16">9:16 竖屏</option>
          <option value="4:5">4:5 小红书</option>
          <option value="16:9">16:9 横屏</option>
          <option value="4:3">4:3</option>
        </select>
      </label>
      <label class="field">输出质量
        <select id="quality">
          <option value="2400">超高清 (2400px)</option>
          <option value="3200" selected>极清 (3200px)</option>
          <option value="4000">4K (4000px)</option>
        </select>
      </label>
      <label class="field">背景模糊
        <select id="blur">
          <option value="0">关闭</option>
          <option value="40">轻度</option>
          <option value="80" selected>中度</option>
          <option value="140">强</option>
        </select>
      </label>
      <label class="field">背景源
        <select id="bg-source">
          <option value="auto" selected>第 1 页</option>
          <option value="none">仅主题纯色</option>
        </select>
      </label>
      <label class="field">内边距
        <select id="padding">
          <option value="0">无</option>
          <option value="0.008">极紧</option>
          <option value="0.018">紧凑</option>
          <option value="0.03" selected>偏紧</option>
          <option value="0.05">标准</option>
          <option value="0.07">宽松</option>
          <option value="0.1">极宽</option>
        </select>
      </label>
      <label class="field">纵向间距
        <select id="gap">
          <option value="0">无</option>
          <option value="0.004">极小</option>
          <option value="0.008" selected>小</option>
          <option value="0.014">偏小</option>
          <option value="0.02">中</option>
          <option value="0.03">偏大</option>
          <option value="0.045">大</option>
          <option value="0.06">极大</option>
        </select>
      </label>
      <label class="field">横向间距
        <select id="gap-x">
          <option value="auto" selected>跟随纵向</option>
          <option value="0">无</option>
          <option value="0.004">极小</option>
          <option value="0.008">小</option>
          <option value="0.014">偏小</option>
          <option value="0.02">中</option>
          <option value="0.03">偏大</option>
          <option value="0.045">大</option>
          <option value="0.06">极大</option>
        </select>
      </label>
    </div>
  </div>

  <!-- 3. 排布选择 -->
  <div class="panel">
    <h2>3. 选择排布方式</h2>
    <div class="layouts" id="layouts"></div>
  </div>

  <!-- 4. 槽位分配 -->
  <div class="panel">
    <h2>4. 槽位分配</h2>
    <div class="slot-controls">
      <label class="field" id="slotcount-wrap" style="display:none;">槽位数量
        <input type="number" id="slotcount" min="1" max="20" value="2" />
      </label>
      <button id="auto-assign">顺序自动填充</button>
      <span class="status" id="slot-hint">请先上传 PDF</span>
    </div>
    <div class="slots-grid" id="slots-grid"></div>
  </div>

  <!-- 5. 预览 + 导出 -->
  <div class="panel">
    <h2>5. 预览 &amp; 导出</h2>
    <div class="row" style="margin-bottom: 14px;">
      <button class="primary" id="render-btn" disabled>生成预览</button>
      <button id="download-btn" disabled>下载图片</button>
      <button id="download-bg-btn" disabled>下载模糊背景</button>
      <span class="status" id="render-status"></span>
    </div>
    <div id="preview-wrap">
      <div class="empty-hint" id="empty-hint">上传 PDF 并选择排布方式后，点击「生成预览」</div>
      <canvas id="preview" style="display:none;"></canvas>
    </div>
  </div>
</div>

<!-- LAYOUTS 必须先于 app.js 加载 -->
<script src="layouts.js"></script>
<script src="app.js"></script>
</body>
</html>
